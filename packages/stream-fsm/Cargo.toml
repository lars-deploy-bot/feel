[package]
name = "stream-fsm"
version = "0.1.0"
edition = "2021"
description = "NDJSON streaming protocol state machine for Alive — compiled to WASM for browser and Node.js"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
tsify-next = { version = "0.5", features = ["js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
