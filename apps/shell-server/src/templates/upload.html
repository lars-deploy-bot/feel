<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SHELL | Upload</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1e1e'/%3E%3Ctext x='12' y='68' font-family='monospace' font-size='50' font-weight='bold' fill='%230dbc79'%3E%24_%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/themes/default-dark/style.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.16/jstree.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      transition: max-width 0.3s ease;
    }
    .container.expanded {
      max-width: 1400px;
    }
    .main-content {
      display: block;
    }
    .main-content.grid {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 20px;
    }
    .header {
      background: #2d2d2d;
      padding: 20px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    h1 {
      color: #fff;
      font-size: 24px;
    }
    .header-buttons {
      display: flex;
      gap: 8px;
    }
    .header-buttons button {
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    #back {
      background: #0dbc79;
      color: #fff;
    }
    #back:hover {
      background: #0aa868;
    }
    #logout {
      background: #f14c4c;
      color: #fff;
    }
    #logout:hover {
      background: #d43e3e;
    }
    .workspace-info {
      background: #2d2d2d;
      padding: 16px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #d4d4d4;
      font-size: 14px;
    }
    .workspace-info strong {
      color: #0dbc79;
    }
    .upload-section {
      background: #2d2d2d;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: #d4d4d4;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input[type="text"],
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #0dbc79;
    }
    .form-group select option {
      background: #1e1e1e;
      color: #fff;
    }
    .form-group select optgroup {
      background: #2d2d2d;
      color: #888;
    }
    .destination-row {
      display: flex;
      gap: 8px;
    }
    .destination-row select {
      flex: 1;
    }
    .list-btn {
      padding: 12px 16px;
      background: #2472c8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .list-btn:hover {
      background: #1e5fa8;
    }
    .file-tree {
      background: #2d2d2d;
      border-radius: 8px;
      display: none;
      flex-direction: column;
      height: 100%;
      min-height: 400px;
    }
    .file-tree.show {
      display: flex;
    }
    .file-tree .path-header {
      color: #0dbc79;
      padding: 12px 16px;
      border-bottom: 1px solid #444;
      font-size: 13px;
      font-family: monospace;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .file-tree .close-btn {
      background: #f14c4c;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .file-tree .close-btn:hover {
      background: #d43e3e;
    }
    #file-tree-content {
      flex: 1;
      overflow: auto;
      background: #1e1e1e;
      border-radius: 0 0 8px 8px;
    }
    .file-tree .jstree-container-ul {
      padding: 8px !important;
    }
    .dropzone {
      border: 2px dashed #444;
      border-radius: 8px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #1e1e1e;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: #0dbc79;
      background: #252525;
    }
    .dropzone-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .dropzone-text {
      color: #d4d4d4;
      font-size: 16px;
      margin-bottom: 8px;
    }
    .dropzone-subtext {
      color: #888;
      font-size: 14px;
    }
    .file-input {
      display: none;
    }
    .selected-file {
      background: #1e1e1e;
      padding: 16px;
      border-radius: 4px;
      margin-top: 16px;
      display: none;
    }
    .selected-file.show {
      display: block;
    }
    .selected-file-name {
      color: #0dbc79;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .selected-file-size {
      color: #888;
      font-size: 12px;
    }
    .check-button {
      padding: 10px 20px;
      background: #2472c8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .check-button:hover:not(:disabled) {
      background: #1e5fa8;
    }
    .check-button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .upload-button {
      width: 100%;
      padding: 14px;
      background: #0dbc79;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: none;
    }
    .upload-button.show {
      display: block;
    }
    .upload-button:hover:not(:disabled) {
      background: #0aa868;
    }
    .upload-button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .progress {
      width: 100%;
      height: 4px;
      background: #444;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 12px;
      display: none;
    }
    .progress.show {
      display: block;
    }
    .progress-bar {
      height: 100%;
      background: #0dbc79;
      transition: width 0.3s;
      width: 0%;
    }
    .message {
      padding: 16px;
      border-radius: 4px;
      margin-top: 20px;
      display: none;
      font-size: 14px;
    }
    .message.show {
      display: block;
    }
    .message.success {
      background: rgba(13, 188, 121, 0.1);
      border: 1px solid #0dbc79;
      color: #0dbc79;
    }
    .message.error {
      background: rgba(241, 76, 76, 0.1);
      border: 1px solid #f14c4c;
      color: #f14c4c;
    }
    @media (max-width: 1024px) {
      .main-content.grid {
        grid-template-columns: 1fr;
      }
      .file-tree {
        min-height: 300px;
        max-height: 400px;
      }
    }
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      .header {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }
      h1 {
        font-size: 20px;
      }
      .header-buttons {
        width: 100%;
      }
      .header-buttons button {
        flex: 1;
      }
      .upload-section {
        padding: 20px;
      }
      .dropzone {
        padding: 40px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📦 Upload Files</h1>
      <div class="header-buttons">
        <button id="back">← Back</button>
        <button id="logout">Logout</button>
      </div>
    </div>

    <div class="main-content" id="main-content">
      <div class="upload-section">
        <div class="form-group">
          <label for="destination">Upload destination</label>
          <div class="destination-row">
            <select id="destination">
              <option value="root">{{UPLOAD_PATH}}</option>
              <optgroup label="Websites" id="sites-group">
                <option value="" disabled>Loading sites...</option>
              </optgroup>
            </select>
            <button type="button" class="list-btn" id="list-files-btn">List Files</button>
          </div>
        </div>

        <div class="form-group">
          <label for="target-dir">Subdirectory (optional)</label>
          <input type="text" id="target-dir" placeholder="Leave empty for root" value="" />
          <button class="check-button" id="check-button">Check Directory</button>
        </div>

        <div class="dropzone" id="dropzone">
          <div class="dropzone-icon">📦</div>
          <div class="dropzone-text">Drag & drop a ZIP file here</div>
          <div class="dropzone-subtext">or click to browse</div>
        </div>

        <input type="file" id="file-input" class="file-input" accept=".zip" />

        <div class="selected-file" id="selected-file">
          <div class="selected-file-name" id="file-name"></div>
          <div class="selected-file-size" id="file-size"></div>
        </div>

        <button class="upload-button" id="upload-button">Upload & Extract</button>

        <div class="progress" id="progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="message" id="message"></div>
      </div>

      <div class="file-tree" id="file-tree">
        <div class="path-header">
          <span id="file-tree-path"></span>
          <button class="close-btn" id="close-tree-btn">Close</button>
        </div>
        <div id="file-tree-content"></div>
      </div>
    </div>
  </div>

  <script>
    // State management (React-like)
    const defaultUploadPath = '{{UPLOAD_PATH}}';
    const state = {
      workspace: 'root',
      uploadPath: defaultUploadPath,
      targetDir: '',
      file: null,
      uploading: false,
      checking: false,
      progress: 0,
      message: '',
      messageType: '',
      sites: []
    };

    // DOM references
    const elements = {
      container: document.querySelector('.container'),
      mainContent: document.getElementById('main-content'),
      destination: document.getElementById('destination'),
      sitesGroup: document.getElementById('sites-group'),
      listFilesBtn: document.getElementById('list-files-btn'),
      fileTree: document.getElementById('file-tree'),
      closeTreeBtn: document.getElementById('close-tree-btn'),
      targetDirInput: document.getElementById('target-dir'),
      checkButton: document.getElementById('check-button'),
      dropzone: document.getElementById('dropzone'),
      fileInput: document.getElementById('file-input'),
      selectedFile: document.getElementById('selected-file'),
      fileName: document.getElementById('file-name'),
      fileSize: document.getElementById('file-size'),
      uploadButton: document.getElementById('upload-button'),
      progress: document.getElementById('progress'),
      progressBar: document.getElementById('progress-bar'),
      message: document.getElementById('message'),
      backButton: document.getElementById('back'),
      logoutButton: document.getElementById('logout')
    };

    // Utility functions
    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function showFileTree(show) {
      if (show) {
        elements.fileTree.classList.add('show');
        elements.mainContent.classList.add('grid');
        elements.container.classList.add('expanded');
      } else {
        elements.fileTree.classList.remove('show');
        elements.mainContent.classList.remove('grid');
        elements.container.classList.remove('expanded');
      }
    }

    function setState(updates) {
      Object.assign(state, updates);
      render();
    }

    // Render function (updates UI based on state)
    function render() {
      // Target directory
      elements.targetDirInput.value = state.targetDir;

      // Selected file
      if (state.file) {
        elements.selectedFile.classList.add('show');
        elements.fileName.textContent = state.file.name;
        elements.fileSize.textContent = formatFileSize(state.file.size);
        elements.uploadButton.classList.add('show');
      } else {
        elements.selectedFile.classList.remove('show');
        elements.uploadButton.classList.remove('show');
      }

      // Check button
      elements.checkButton.disabled = state.checking || state.uploading;
      elements.checkButton.textContent = state.checking ? 'Checking...' : 'Check Directory';

      // Upload button
      elements.uploadButton.disabled = state.uploading;
      elements.uploadButton.textContent = state.uploading
        ? `Uploading ${state.progress}%`
        : 'Upload & Extract';

      // Progress bar
      if (state.uploading) {
        elements.progress.classList.add('show');
        elements.progressBar.style.width = state.progress + '%';
      } else {
        elements.progress.classList.remove('show');
      }

      // Message
      if (state.message) {
        elements.message.classList.add('show');
        elements.message.classList.remove('success', 'error');
        elements.message.classList.add(state.messageType);
        elements.message.textContent = state.message;
      } else {
        elements.message.classList.remove('show');
      }
    }

    // Event handlers
    function handleFile(file) {
      if (!file) return;

      if (!file.name.endsWith('.zip')) {
        setState({
          message: 'Please select a ZIP file',
          messageType: 'error'
        });
        return;
      }

      setState({
        file: file,
        message: '',
        messageType: ''
      });
    }

    async function checkDirectory() {
      if (state.checking || state.uploading) return;

      setState({
        checking: true,
        message: '',
        messageType: ''
      });

      const formData = new FormData();
      formData.append('workspace', state.workspace);
      formData.append('targetDir', state.targetDir || './');

      try {
        const response = await fetch('/api/check-directory', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (response.ok) {
          setState({
            message: result.message + (result.exists ? ' ✓' : ' ✗'),
            messageType: result.exists ? 'success' : 'error',
            checking: false
          });
        } else {
          setState({
            message: result.error || 'Check failed',
            messageType: 'error',
            checking: false
          });
        }
      } catch (err) {
        setState({
          message: 'Check failed: ' + err.message,
          messageType: 'error',
          checking: false
        });
      }
    }

    async function uploadFile() {
      if (!state.file || state.uploading) return;

      setState({
        uploading: true,
        progress: 0,
        message: '',
        messageType: ''
      });

      const formData = new FormData();
      formData.append('file', state.file);
      formData.append('workspace', state.workspace);
      formData.append('targetDir', state.targetDir || './');

      try {
        setState({ progress: 30 });

        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        setState({ progress: 90 });
        const result = await response.json();
        setState({ progress: 100 });

        if (response.ok && result.success) {
          setState({
            message: result.message || 'Upload successful!',
            messageType: 'success'
          });

          // Reset after 2 seconds
          setTimeout(() => {
            elements.fileInput.value = '';
            setState({
              file: null,
              progress: 0,
              message: '',
              messageType: ''
            });
          }, 2000);
        } else {
          setState({
            message: result.error || 'Upload failed',
            messageType: 'error',
            uploading: false
          });
        }
      } catch (err) {
        setState({
          message: 'Upload failed: ' + err.message,
          messageType: 'error',
          uploading: false
        });
      }

      if (state.uploading) {
        setState({ uploading: false });
      }
    }

    // Event listeners
    elements.dropzone.addEventListener('click', () => {
      elements.fileInput.click();
    });

    elements.fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    elements.dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      elements.dropzone.classList.add('dragover');
    });

    elements.dropzone.addEventListener('dragleave', () => {
      elements.dropzone.classList.remove('dragover');
    });

    elements.dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      elements.dropzone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });

    elements.checkButton.addEventListener('click', checkDirectory);

    elements.uploadButton.addEventListener('click', uploadFile);

    elements.targetDirInput.addEventListener('input', (e) => {
      setState({ targetDir: e.target.value });
    });

    elements.backButton.addEventListener('click', () => {
      window.location.href = '/dashboard';
    });

    elements.logoutButton.addEventListener('click', () => {
      window.location.href = '/logout';
    });

    // Load sites into dropdown
    let sitesBasePath = '';
    fetch('/api/sites')
      .then(r => r.json())
      .then(data => {
        if (data.sitesPath) {
          sitesBasePath = data.sitesPath;
        }
        if (data.sites && data.sites.length > 0) {
          state.sites = data.sites;
          elements.sitesGroup.innerHTML = data.sites
            .map(site => `<option value="site:${site}">${site} → ${sitesBasePath}/${site}/user</option>`)
            .join('');
        } else {
          elements.sitesGroup.innerHTML = '<option value="" disabled>No sites available</option>';
        }
      })
      .catch(() => {
        elements.sitesGroup.innerHTML = '<option value="" disabled>Failed to load sites</option>';
      });

    // Handle destination change
    elements.destination.addEventListener('change', (e) => {
      const value = e.target.value;
      showFileTree(false);
      if (value === 'root') {
        setState({ workspace: 'root', uploadPath: defaultUploadPath });
      } else if (value.startsWith('site:')) {
        const siteName = value.slice(5);
        setState({
          workspace: value,
          uploadPath: `${sitesBasePath}/${siteName}/user`
        });
      }
    });

    // Close tree button
    elements.closeTreeBtn.addEventListener('click', () => {
      showFileTree(false);
    });

    // List files button
    elements.listFilesBtn.addEventListener('click', async () => {
      elements.listFilesBtn.textContent = 'Loading...';
      elements.listFilesBtn.disabled = true;

      const formData = new FormData();
      formData.append('workspace', state.workspace);

      try {
        const res = await fetch('/api/list-files', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok && data.tree) {
          document.getElementById('file-tree-path').textContent = data.path;
          const treeContent = document.getElementById('file-tree-content');

          // Destroy existing jstree if any
          if ($.jstree.reference(treeContent)) {
            $(treeContent).jstree('destroy');
          }

          // Initialize jstree
          $(treeContent).jstree({
            core: {
              data: data.tree,
              themes: { name: 'default-dark', dots: true, icons: true }
            }
          });

          showFileTree(true);
        } else {
          document.getElementById('file-tree-path').textContent = 'Error: ' + (data.error || 'Failed to list files');
          document.getElementById('file-tree-content').innerHTML = '';
          showFileTree(true);
        }
      } catch (err) {
        document.getElementById('file-tree-path').textContent = 'Error: ' + err.message;
        document.getElementById('file-tree-content').innerHTML = '';
        showFileTree(true);
      }

      elements.listFilesBtn.textContent = 'List Files';
      elements.listFilesBtn.disabled = false;
    });

    // Initial render
    render();
  </script>
</body>
</html>
