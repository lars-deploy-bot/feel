<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SHELL | Terminal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1e1e'/%3E%3Ctext x='12' y='68' font-family='monospace' font-size='50' font-weight='bold' fill='%230dbc79'%3E%24_%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/client/shell.css">
  <style>
    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      position: fixed;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-overflow-scrolling: touch;
    }
    #shell-container {
      position: fixed;
      top: 41px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }
    #shell {
      height: 100%;
      width: 100%;
      padding: 10px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 768px) {
      #shell-container { padding-bottom: env(safe-area-inset-bottom, 0px); }
      #shell { padding: 5px; }
      body { -webkit-user-select: none; user-select: none; }
      #shell { -webkit-user-select: text; user-select: text; }
    }
  </style>
</head>
<body class="m-0 p-0 box-border font-sans bg-shell-bg">
  <!-- Header -->
  <div id="header" class="bg-shell-surface px-4 py-2 flex justify-between items-center border-b border-shell-border fixed top-0 left-0 right-0 z-50 h-[41px]">
    <h1 class="text-white text-sm font-semibold">Shell</h1>
    <div class="flex gap-2">
      <a href="{{BACK_URL}}" class="bg-shell-accent hover:bg-shell-accent-hover text-white no-underline px-3 py-1.5 rounded text-xs transition-colors">{{BACK_LABEL}}</a>
      <a href="/logout" class="bg-shell-danger hover:bg-shell-danger-hover text-white no-underline px-3 py-1.5 rounded text-xs transition-colors">Logout</a>
    </div>
  </div>

  <!-- Error message -->
  <div id="error" class="fixed top-[51px] left-2.5 right-2.5 bg-red-900/20 border border-red-600 text-red-500 p-3 rounded-md hidden text-sm z-40"></div>

  <!-- Loading indicator -->
  <div id="loading" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-base">Connecting to shell...</div>

  <!-- Terminal container -->
  <div id="shell-container">
    <div id="shell"></div>
  </div>

  <link rel="stylesheet" href="/client/shell-term.css">
  <script type="module" src="/client/shell-term.js"></script>
</body>
</html>
