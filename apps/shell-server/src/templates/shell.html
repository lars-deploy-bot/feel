<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Shell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      overflow: hidden;
      height: 100%;
      width: 100%;
      position: fixed;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-overflow-scrolling: touch;
    }
    #header {
      background: #2d2d2d;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #444;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 41px;
    }
    #header h1 {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }
    .header-buttons {
      display: flex;
      gap: 8px;
    }
    .header-buttons button {
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    #back {
      background: #0dbc79;
      color: #fff;
    }
    #back:hover {
      background: #0aa868;
    }
    #logout {
      background: #f14c4c;
      color: #fff;
    }
    #logout:hover {
      background: #d43e3e;
    }
    #shell-container {
      position: fixed;
      top: 41px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }
    #shell {
      height: 100%;
      width: 100%;
      padding: 10px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    #error {
      position: fixed;
      top: 51px;
      left: 10px;
      right: 10px;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgb(220, 38, 38);
      color: rgb(220, 38, 38);
      padding: 12px;
      border-radius: 6px;
      display: none;
      font-size: 14px;
      z-index: 99;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
    }

    /* Mobile-specific optimizations */
    @media (max-width: 768px) {
      #shell-container {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      #shell {
        padding: 5px;
      }
    }

    /* Prevent text selection on mobile to avoid interfering with terminal */
    @media (max-width: 768px) {
      body {
        -webkit-user-select: none;
        user-select: none;
      }
      #shell {
        -webkit-user-select: text;
        user-select: text;
      }
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🖥️ Shell</h1>
    <div class="header-buttons">
      <button id="back" onclick="window.location.href='/dashboard'">← Back</button>
      <button id="logout" onclick="window.location.href='/logout'">Logout</button>
    </div>
  </div>
  <div id="error"></div>
  <div id="loading">Connecting to shell...</div>
  <div id="shell-container">
    <div id="shell"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const workspace = params.get('workspace') || 'root';

    // Detect mobile device
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                     || window.innerWidth <= 768;

    // Use larger font on mobile for better readability
    const fontSize = isMobile ? 16 : 14;

    const term = new Terminal({
      cursorBlink: true,
      fontSize: fontSize,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      scrollback: 1000,
      theme: {
        background: '#1e1e1e',
        foreground: '#d4d4d4',
        cursor: '#d4d4d4',
        black: '#000000',
        red: '#cd3131',
        green: '#0dbc79',
        yellow: '#e5e510',
        blue: '#2472c8',
        magenta: '#bc3fbc',
        cyan: '#11a8cd',
        white: '#e5e5e5',
        brightBlack: '#666666',
        brightRed: '#f14c4c',
        brightGreen: '#23d18b',
        brightYellow: '#f5f543',
        brightBlue: '#3b8eea',
        brightMagenta: '#d670d6',
        brightCyan: '#29b8db',
        brightWhite: '#e5e5e5',
      }
    });

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();

    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    term.open(document.getElementById('shell'));

    // Fit terminal to container
    function fitTerminal() {
      try {
        fitAddon.fit();
      } catch (e) {
        console.error('Failed to fit terminal:', e);
      }
    }

    requestAnimationFrame(() => {
      fitTerminal();
    });

    // WebSocket connection
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}/ws?workspace=${workspace}`);

    ws.onopen = () => {
      document.getElementById('loading').style.display = 'none';
      ws.send(JSON.stringify({
        type: 'resize',
        cols: term.cols,
        rows: term.rows
      }));
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'data') {
        term.write(msg.data);
      } else if (msg.type === 'exit') {
        term.write(`\r\n\r\n[Process exited with code ${msg.exitCode}]\r\n`);
      }
    };

    ws.onerror = () => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').textContent = 'Connection error. Please refresh.';
      document.getElementById('error').style.display = 'block';
    };

    term.onData((data) => {
      if (ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    // Handle resize - throttled to prevent excessive calls
    let resizeTimeout;
    function handleResize() {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        fitTerminal();
        if (ws.readyState === 1) {
          ws.send(JSON.stringify({
            type: 'resize',
            cols: term.cols,
            rows: term.rows
          }));
        }
      }, 100);
    }

    window.addEventListener('resize', handleResize);

    // Mobile: Handle visual viewport changes (keyboard appearing/disappearing)
    if (isMobile && window.visualViewport) {
      let lastHeight = window.visualViewport.height;

      window.visualViewport.addEventListener('resize', () => {
        const currentHeight = window.visualViewport.height;
        const shellContainer = document.getElementById('shell-container');

        // Adjust container height when keyboard appears
        if (shellContainer) {
          const headerHeight = 41;
          const availableHeight = currentHeight - headerHeight;
          shellContainer.style.height = availableHeight + 'px';
        }

        // Only refit if height changed significantly (keyboard show/hide)
        if (Math.abs(currentHeight - lastHeight) > 100) {
          setTimeout(() => {
            fitTerminal();
            if (ws.readyState === 1) {
              ws.send(JSON.stringify({
                type: 'resize',
                cols: term.cols,
                rows: term.rows
              }));
            }
          }, 150);
          lastHeight = currentHeight;
        }
      });

      // Initial adjustment
      const shellContainer = document.getElementById('shell-container');
      if (shellContainer) {
        const headerHeight = 41;
        const availableHeight = window.visualViewport.height - headerHeight;
        shellContainer.style.height = availableHeight + 'px';
      }
    }

    // Mobile: Scroll terminal into view when it receives focus
    if (isMobile) {
      const shellElement = document.getElementById('shell');
      if (shellElement) {
        shellElement.addEventListener('focus', () => {
          setTimeout(() => {
            shellElement.scrollIntoView({ behavior: 'smooth', block: 'end' });
          }, 300);
        }, true);
      }
    }
  </script>
</body>
</html>
