<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SHELL | Terminal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1e1e'/%3E%3Ctext x='12' y='68' font-family='monospace' font-size='50' font-weight='bold' fill='%230dbc79'%3E%24_%3C/text%3E%3C/svg%3E">
  <!-- Tailwind CSS v4 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'shell-bg': '#1e1e1e',
            'shell-surface': '#2d2d2d',
            'shell-border': '#444',
            'shell-accent': '#0dbc79',
            'shell-accent-hover': '#0aa868',
            'shell-danger': '#f14c4c',
            'shell-danger-hover': '#d43e3e',
            'shell-text': '#d4d4d4',
            'shell-text-muted': '#888',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    /* Critical terminal layout styles that need precise control */
    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      position: fixed;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-overflow-scrolling: touch;
    }
    #shell-container {
      position: fixed;
      top: 41px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }
    #shell {
      height: 100%;
      width: 100%;
      padding: 10px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Mobile-specific optimizations */
    @media (max-width: 768px) {
      #shell-container {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      #shell {
        padding: 5px;
      }
      body {
        -webkit-user-select: none;
        user-select: none;
      }
      #shell {
        -webkit-user-select: text;
        user-select: text;
      }
    }
  </style>
</head>
<body class="m-0 p-0 box-border font-sans bg-shell-bg">
  <!-- Header -->
  <div id="header" class="bg-shell-surface px-4 py-2 flex justify-between items-center border-b border-shell-border fixed top-0 left-0 right-0 z-50 h-[41px]">
    <h1 class="text-white text-sm font-semibold">Shell</h1>
    <div class="flex gap-2">
      <button
        id="back"
        onclick="window.location.href='{{BACK_URL}}'"
        class="bg-shell-accent hover:bg-shell-accent-hover text-white border-none px-3 py-1.5 rounded text-xs cursor-pointer transition-colors"
      >
        {{BACK_LABEL}}
      </button>
      <button
        id="logout"
        onclick="window.location.href='/logout'"
        class="bg-shell-danger hover:bg-shell-danger-hover text-white border-none px-3 py-1.5 rounded text-xs cursor-pointer transition-colors"
      >
        Logout
      </button>
    </div>
  </div>

  <!-- Error message -->
  <div
    id="error"
    class="fixed top-[51px] left-2.5 right-2.5 bg-red-900/20 border border-red-600 text-red-500 p-3 rounded-md hidden text-sm z-40"
  ></div>

  <!-- Loading indicator -->
  <div id="loading" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-base">
    Connecting to shell...
  </div>

  <!-- Terminal container -->
  <div id="shell-container">
    <div id="shell"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const workspace = params.get('workspace') || 'root';

    // Detect mobile device
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                     || window.innerWidth <= 768;

    // Use larger font on mobile for better readability
    const fontSize = isMobile ? 16 : 14;

    const term = new Terminal({
      cursorBlink: true,
      fontSize: fontSize,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      scrollback: 1000,
      theme: {
        background: '#1e1e1e',
        foreground: '#d4d4d4',
        cursor: '#d4d4d4',
        black: '#000000',
        red: '#cd3131',
        green: '#0dbc79',
        yellow: '#e5e510',
        blue: '#2472c8',
        magenta: '#bc3fbc',
        cyan: '#11a8cd',
        white: '#e5e5e5',
        brightBlack: '#666666',
        brightRed: '#f14c4c',
        brightGreen: '#23d18b',
        brightYellow: '#f5f543',
        brightBlue: '#3b8eea',
        brightMagenta: '#d670d6',
        brightCyan: '#29b8db',
        brightWhite: '#e5e5e5',
      }
    });

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();

    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    term.open(document.getElementById('shell'));

    // Fit terminal to container
    function fitTerminal() {
      try {
        fitAddon.fit();
      } catch (e) {
        console.error('Failed to fit terminal:', e);
      }
    }

    requestAnimationFrame(() => {
      fitTerminal();
    });

    // WebSocket connection
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}/ws?workspace=${workspace}`);

    ws.onopen = () => {
      document.getElementById('loading').style.display = 'none';
      ws.send(JSON.stringify({
        type: 'resize',
        cols: term.cols,
        rows: term.rows
      }));
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'data') {
        term.write(msg.data);
      } else if (msg.type === 'exit') {
        term.write(`\r\n\r\n[Process exited with code ${msg.exitCode}]\r\n`);
      }
    };

    ws.onerror = () => {
      document.getElementById('loading').style.display = 'none';
      const errorEl = document.getElementById('error');
      errorEl.textContent = 'Connection error. Please refresh.';
      errorEl.classList.remove('hidden');
    };

    term.onData((data) => {
      if (ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    // Handle resize - throttled to prevent excessive calls
    let resizeTimeout;
    function handleResize() {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        fitTerminal();
        if (ws.readyState === 1) {
          ws.send(JSON.stringify({
            type: 'resize',
            cols: term.cols,
            rows: term.rows
          }));
        }
      }, 100);
    }

    window.addEventListener('resize', handleResize);

    // Mobile: Handle visual viewport changes (keyboard appearing/disappearing)
    if (isMobile && window.visualViewport) {
      let lastHeight = window.visualViewport.height;

      window.visualViewport.addEventListener('resize', () => {
        const currentHeight = window.visualViewport.height;
        const shellContainer = document.getElementById('shell-container');

        // Adjust container height when keyboard appears
        if (shellContainer) {
          const headerHeight = 41;
          const availableHeight = currentHeight - headerHeight;
          shellContainer.style.height = availableHeight + 'px';
        }

        // Only refit if height changed significantly (keyboard show/hide)
        if (Math.abs(currentHeight - lastHeight) > 100) {
          setTimeout(() => {
            fitTerminal();
            if (ws.readyState === 1) {
              ws.send(JSON.stringify({
                type: 'resize',
                cols: term.cols,
                rows: term.rows
              }));
            }
          }, 150);
          lastHeight = currentHeight;
        }
      });

      // Initial adjustment
      const shellContainer = document.getElementById('shell-container');
      if (shellContainer) {
        const headerHeight = 41;
        const availableHeight = window.visualViewport.height - headerHeight;
        shellContainer.style.height = availableHeight + 'px';
      }
    }

    // Mobile: Scroll terminal into view when it receives focus
    if (isMobile) {
      const shellElement = document.getElementById('shell');
      if (shellElement) {
        shellElement.addEventListener('focus', () => {
          setTimeout(() => {
            shellElement.scrollIntoView({ behavior: 'smooth', block: 'end' });
          }, 300);
        }, true);
      }
    }
  </script>
</body>
</html>
