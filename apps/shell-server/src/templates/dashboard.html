<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SHELL | Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1e1e'/%3E%3Ctext x='12' y='68' font-family='monospace' font-size='50' font-weight='bold' fill='%230dbc79'%3E%24_%3C/text%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 700px;
    }
    .header {
      background: #2d2d2d;
      padding: 20px;
      border-radius: 8px 8px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      color: #fff;
      font-size: 24px;
    }
    h2 {
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
    }
    button {
      background: #f14c4c;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #d43e3e;
    }
    .options {
      background: #2d2d2d;
      padding: 30px 20px;
      border-radius: 0 0 8px 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .option {
      background: #1e1e1e;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 30px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .option:hover {
      border-color: #0dbc79;
      background: #252525;
    }
    .option-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .option-title {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .option-desc {
      color: #888;
      font-size: 14px;
      word-break: break-all;
    }
    @media (max-width: 768px) {
      .options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Shell Dashboard</h1>
      <button onclick="window.location.href='/logout'">Logout</button>
    </div>
    <div class="options">
      <a href="/shell?workspace=root" class="option">
        <div class="option-icon">🖥️</div>
        <div class="option-title">Shell Terminal</div>
        <div class="option-desc">{{SHELL_DEFAULT_PATH}}</div>
      </a>
      <a href="/upload?workspace=root" class="option">
        <div class="option-icon">📦</div>
        <div class="option-title">Upload Files</div>
        <div class="option-desc">Choose destination on next page</div>
      </a>
    </div>
  </div>
</body>
</html>
