<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dashboard</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
    }
    .header {
      background: #2d2d2d;
      padding: 20px;
      border-radius: 8px 8px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      color: #fff;
      font-size: 24px;
    }
    button {
      background: #f14c4c;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #d43e3e;
    }
    .workspace-selector {
      background: #2d2d2d;
      padding: 20px;
      border-top: 1px solid #444;
    }
    .workspace-selector label {
      color: #d4d4d4;
      font-size: 14px;
      display: block;
      margin-bottom: 8px;
    }
    .workspace-selector input {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
    }
    .workspace-selector input:focus {
      outline: none;
      border-color: #0dbc79;
    }
    .options {
      background: #2d2d2d;
      padding: 30px 20px;
      border-radius: 0 0 8px 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .option {
      background: #1e1e1e;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .option:hover {
      border-color: #0dbc79;
      background: #252525;
    }
    .option-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .option-title {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .option-desc {
      color: #888;
      font-size: 14px;
    }
    @media (max-width: 768px) {
      .options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container" x-data="{ workspace: 'root' }">
    <div class="header">
      <h1>Shell Dashboard</h1>
      <button onclick="window.location.href='/logout'">Logout</button>
    </div>
    <div class="workspace-selector">
      <label for="workspace">Workspace (optional, leave empty for root)</label>
      <input type="text" x-model="workspace" placeholder="e.g., example.com or root" />
    </div>
    <div class="options">
      <a :href="`/shell?workspace=${encodeURIComponent(workspace || 'root')}`" class="option">
        <div class="option-icon">🖥️</div>
        <div class="option-title">Shell Terminal</div>
        <div class="option-desc">Access command line</div>
      </a>
      <a :href="`/upload?workspace=${encodeURIComponent(workspace || 'root')}`" class="option">
        <div class="option-icon">📦</div>
        <div class="option-title">Upload Files</div>
        <div class="option-desc">Upload & extract ZIP</div>
      </a>
    </div>
  </div>
</body>
</html>
