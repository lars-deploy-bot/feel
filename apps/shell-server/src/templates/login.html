<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Shell Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: #2d2d2d;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      color: #fff;
      margin-bottom: 24px;
      font-size: 24px;
      text-align: center;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    input {
      padding: 14px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #fff;
      border-radius: 4px;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #0dbc79;
    }
    button {
      padding: 14px;
      background: #0dbc79;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:hover {
      background: #0aa868;
    }
    button:active {
      background: #098e5a;
    }
    .error {
      color: #f14c4c;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .login-box {
        padding: 30px 20px;
      }
      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🖥️ Shell Access</h1>
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Password" autofocus required />
      <button type="submit">Login</button>
      {{ERROR_MESSAGE}}
    </form>
  </div>
</body>
</html>
