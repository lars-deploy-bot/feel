<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SHELL | Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1e1e'/%3E%3Ctext x='12' y='68' font-family='monospace' font-size='50' font-weight='bold' fill='%230dbc79'%3E%24_%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/client/shell.css">
</head>
<body class="m-0 p-5 box-border font-sans bg-shell-bg min-h-screen flex items-center justify-center">
  <div class="w-full max-w-2xl">
    <!-- Header -->
    <div class="bg-shell-surface p-5 rounded-t-lg flex justify-between items-center">
      <h1 class="text-white text-2xl font-semibold">Shell Dashboard</h1>
      <button
        onclick="window.location.href='/logout'"
        class="bg-shell-danger hover:bg-shell-danger-hover text-white border-none px-4 py-2 rounded text-sm cursor-pointer transition-colors"
      >
        Logout
      </button>
    </div>

    <!-- Options Grid -->
    <div class="bg-shell-surface p-6 rounded-b-lg grid grid-cols-1 md:grid-cols-3 gap-5">
      <a
        href="/shell?workspace=root"
        class="bg-shell-bg border-2 border-shell-border rounded-lg py-8 px-4 text-center cursor-pointer transition-all hover:border-shell-accent hover:bg-[#252525] no-underline block"
      >
        <div class="text-5xl mb-4">🖥️</div>
        <div class="text-white text-lg font-semibold mb-2">Shell Terminal</div>
        <div class="text-shell-text-muted text-sm break-all">{{SHELL_DEFAULT_PATH}}</div>
      </a>

      <a
        href="/upload?workspace=root"
        class="bg-shell-bg border-2 border-shell-border rounded-lg py-8 px-4 text-center cursor-pointer transition-all hover:border-shell-accent hover:bg-[#252525] no-underline block"
      >
        <div class="text-5xl mb-4">📦</div>
        <div class="text-white text-lg font-semibold mb-2">Upload Files</div>
        <div class="text-shell-text-muted text-sm break-all">Choose destination on next page</div>
      </a>

      <a
        href="/edit"
        class="bg-shell-bg border-2 border-shell-border rounded-lg py-8 px-4 text-center cursor-pointer transition-all hover:border-shell-accent hover:bg-[#252525] no-underline block"
      >
        <div class="text-5xl mb-4">✏️</div>
        <div class="text-white text-lg font-semibold mb-2">Edit Files</div>
        <div class="text-shell-text-muted text-sm break-all">Edit workflows and config files</div>
      </a>
    </div>
  </div>
</body>
</html>
