<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>SHELL | Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1e1e'/%3E%3Ctext x='12' y='68' font-family='monospace' font-size='50' font-weight='bold' fill='%230dbc79'%3E%24_%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/client/shell.css">
</head>
<body class="m-0 p-5 box-border font-sans bg-shell-bg min-h-screen flex items-center justify-center">
  <div class="bg-shell-surface p-10 md:p-8 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-white text-2xl md:text-xl font-semibold text-center mb-6">Shell Access</h1>
    <form method="POST" action="/login" class="flex flex-col gap-4">
      <input
        type="password"
        name="password"
        placeholder="Password"
        autofocus
        required
        class="p-3.5 border border-shell-border bg-shell-bg text-white rounded text-base focus:outline-none focus:border-shell-accent"
      />
      <button
        type="submit"
        class="p-3.5 bg-shell-accent hover:bg-shell-accent-hover active:bg-emerald-700 text-white border-none rounded text-base font-semibold cursor-pointer touch-manipulation transition-colors"
      >
        Login
      </button>
      {{ERROR_MESSAGE}}
    </form>
  </div>
</body>
</html>
