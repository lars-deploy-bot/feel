<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SHELL | Terminal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1e1e'/%3E%3Ctext x='12' y='68' font-family='monospace' font-size='50' font-weight='bold' fill='%230dbc79'%3E%24_%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/client/shell.css">
  <style>
    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    body {
      overflow: hidden;
      height: 100%;
      width: 100%;
      position: fixed;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-overflow-scrolling: touch;
    }
    #main-container {
      position: fixed;
      top: 41px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      overflow: hidden;
    }
    #tab-sidebar {
      width: 180px;
      background: #252526;
      border-right: 1px solid #3c3c3c;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #tab-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .tab-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      color: #9d9d9d;
      font-size: 13px;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-item:hover {
      background: #2a2d2e;
      color: #fff;
    }
    .tab-item.active {
      background: #37373d;
      color: #fff;
      border-left-color: #0dbc79;
    }
    .tab-item .tab-icon {
      margin-right: 8px;
      font-size: 14px;
    }
    .tab-item .tab-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tab-item .tab-close {
      opacity: 0;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 14px;
      line-height: 1;
    }
    .tab-item:hover .tab-close {
      opacity: 0.6;
    }
    .tab-item .tab-close:hover {
      opacity: 1;
      background: #5a5a5a;
    }
    #add-claude-btn {
      margin: 8px 12px 4px;
      padding: 8px;
      background: #c678dd;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    #add-claude-btn:hover {
      background: #b060cc;
    }
    #add-tab-btn {
      margin: 4px 12px 8px;
      padding: 8px;
      background: #0dbc79;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    #add-tab-btn:hover {
      background: #0fa96d;
    }
    #shell-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .terminal-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px;
      display: none;
    }
    .terminal-wrapper.active {
      display: block;
    }
    .terminal-wrapper .xterm {
      height: 100%;
    }
    /* Mobile toolbar */
    #mobile-toolbar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #252526;
      border-top: 1px solid #3c3c3c;
      padding: 8px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
    }
    #mobile-toolbar .toolbar-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    #mobile-toolbar .toolbar-row:last-child {
      margin-bottom: 0;
    }
    #mobile-toolbar button {
      flex: 1;
      padding: 12px 8px;
      background: #3c3c3c;
      border: none;
      border-radius: 6px;
      color: #d4d4d4;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      touch-action: manipulation;
      min-height: 44px;
    }
    #mobile-toolbar button:active {
      background: #4c4c4c;
    }
    #mobile-toolbar button.accent {
      background: #0dbc79;
      color: #fff;
    }
    #mobile-toolbar button.danger {
      background: #f14c4c;
      color: #fff;
    }
    /* Mobile tab bar */
    #mobile-tabs {
      display: none;
      position: fixed;
      top: 41px;
      left: 0;
      right: 0;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      z-index: 50;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #mobile-tabs::-webkit-scrollbar {
      display: none;
    }
    #mobile-tabs-inner {
      display: flex;
      padding: 6px;
      gap: 6px;
      min-width: max-content;
    }
    .mobile-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #3c3c3c;
      border-radius: 6px;
      color: #9d9d9d;
      font-size: 12px;
      white-space: nowrap;
      touch-action: manipulation;
      min-height: 32px;
    }
    .mobile-tab.active {
      background: #0dbc79;
      color: #fff;
    }
    .mobile-tab .mobile-tab-close {
      padding: 2px 6px;
      margin: -2px -4px -2px 0;
      font-size: 14px;
      opacity: 0.7;
    }
    .mobile-tab.active .mobile-tab-close {
      opacity: 1;
    }
    .mobile-add-tab {
      padding: 6px 12px;
      background: #2a2d2e;
      border-radius: 6px;
      color: #0dbc79;
      font-size: 16px;
      font-weight: bold;
      min-height: 32px;
      display: flex;
      align-items: center;
    }
    /* Swipe indicator */
    #swipe-indicator {
      display: none;
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      padding: 12px 20px;
      background: rgba(13, 188, 121, 0.9);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      z-index: 200;
      pointer-events: none;
    }
    #swipe-indicator.left {
      left: 20px;
    }
    #swipe-indicator.right {
      right: 20px;
    }
    @media (max-width: 768px) {
      #tab-sidebar { display: none; }
      #mobile-toolbar { display: block; }
      #mobile-tabs { display: block; }
      #main-container {
        top: 85px;
        bottom: calc(88px + env(safe-area-inset-bottom, 0px));
      }
      .terminal-wrapper { padding: 4px; }
      body { -webkit-user-select: none; user-select: none; }
      .terminal-wrapper { -webkit-user-select: text; user-select: text; }
    }
    /* Light mode */
    @media (prefers-color-scheme: light) {
      body { background: #f5f5f5; }
      #header { background: #e8e8e8; border-bottom-color: #d0d0d0; }
      #header h1 { color: #222; }
      #loading { color: #333; }
      #tab-sidebar { background: #e8e8e8; border-right-color: #d0d0d0; }
      .tab-item { color: #555; }
      .tab-item:hover { background: #ddd; color: #222; }
      .tab-item.active { background: #fff; color: #222; }
      .tab-item .tab-close:hover { background: #ccc; }
      #add-claude-btn { background: #a855f7; }
      #add-claude-btn:hover { background: #9333ea; }
      #mobile-toolbar { background: #e8e8e8; border-top-color: #d0d0d0; }
      #mobile-toolbar button { background: #d0d0d0; color: #333; }
      #mobile-toolbar button:active { background: #bbb; }
      #mobile-tabs { background: #e8e8e8; border-bottom-color: #d0d0d0; }
      .mobile-tab { background: #d0d0d0; color: #555; }
      .mobile-tab.active { background: #0dbc79; color: #fff; }
      .mobile-add-tab { background: #ddd; }
    }
  </style>
</head>
<body class="m-0 p-0 box-border font-sans bg-shell-bg">
  <!-- Header -->
  <div id="header" class="bg-shell-surface px-4 py-2 flex justify-between items-center border-b border-shell-border fixed top-0 left-0 right-0 z-50 h-[41px]">
    <h1 class="text-white text-sm font-semibold">Shell</h1>
    <div class="flex gap-2">
      <a href="{{BACK_URL}}" class="bg-shell-accent hover:bg-shell-accent-hover text-white no-underline px-3 py-1.5 rounded text-xs transition-colors">{{BACK_LABEL}}</a>
      <a href="/logout" class="bg-shell-danger hover:bg-shell-danger-hover text-white no-underline px-3 py-1.5 rounded text-xs transition-colors">Logout</a>
    </div>
  </div>

  <!-- Error message -->
  <div id="error" class="fixed top-[51px] left-2.5 right-2.5 bg-red-900/20 border border-red-600 text-red-500 p-3 rounded-md hidden text-sm z-40"></div>

  <!-- Loading indicator -->
  <div id="loading" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-base">Connecting to shell...</div>

  <!-- Mobile tab bar -->
  <div id="mobile-tabs">
    <div id="mobile-tabs-inner"></div>
  </div>

  <!-- Swipe indicator -->
  <div id="swipe-indicator"></div>

  <!-- Main container with sidebar and terminal -->
  <div id="main-container">
    <!-- Tab sidebar (desktop) -->
    <div id="tab-sidebar">
      <div id="tab-list"></div>
      <button id="add-claude-btn">+ Claude</button>
      <button id="add-tab-btn">+ New Tab</button>
    </div>

    <!-- Terminal container -->
    <div id="shell-container"></div>
  </div>

  <!-- Mobile toolbar -->
  <div id="mobile-toolbar">
    <div class="toolbar-row">
      <button id="btn-esc">Esc</button>
      <button id="btn-arrow-up">▲</button>
      <button id="btn-arrow-down">▼</button>
      <button id="btn-send" class="accent">⏎</button>
    </div>
    <div class="toolbar-row">
      <button id="btn-scroll-up">↑ Scroll</button>
      <button id="btn-scroll-down">↓ Scroll</button>
      <button id="btn-scroll-bottom" class="accent">⇊</button>
      <button id="btn-paste" class="accent">Paste</button>
    </div>
  </div>

  <link rel="stylesheet" href="/client/shell-term.css">
  <script type="module" src="/client/shell-term.js"></script>
  <script>
    // Scroll buttons with click + long press support
    document.addEventListener('DOMContentLoaded', () => {
      const setupScrollBtn = (btnId, direction) => {
        const btn = document.getElementById(btnId);
        if (!btn) return;

        let interval = null;
        let timeout = null;
        let didLongPress = false;

        const doScroll = () => {
          const term = window.__activeTerminal;
          if (term) term.scrollLines(direction * 5);
        };

        const startLongPress = () => {
          didLongPress = false;
          timeout = setTimeout(() => {
            didLongPress = true;
            interval = setInterval(doScroll, 50);
          }, 200);
        };

        const stopLongPress = () => {
          clearTimeout(timeout);
          clearInterval(interval);
          interval = null;
          timeout = null;
        };

        // Single click (only if not long press)
        btn.addEventListener('click', () => {
          if (!didLongPress) doScroll();
          didLongPress = false;
        });

        // Long press
        btn.addEventListener('touchstart', startLongPress, { passive: true });
        btn.addEventListener('touchend', stopLongPress);
        btn.addEventListener('touchcancel', stopLongPress);
        btn.addEventListener('mousedown', startLongPress);
        btn.addEventListener('mouseup', stopLongPress);
        btn.addEventListener('mouseleave', stopLongPress);
      };

      setupScrollBtn('btn-scroll-up', -1);
      setupScrollBtn('btn-scroll-down', 1);

      // Scroll to bottom button
      const btnBottom = document.getElementById('btn-scroll-bottom');
      if (btnBottom) {
        btnBottom.addEventListener('click', () => {
          const term = window.__activeTerminal;
          if (term) term.scrollToBottom();
        });
      }

      // Send (return) button
      const btnSend = document.getElementById('btn-send');
      if (btnSend) {
        btnSend.addEventListener('click', () => {
          const ws = window.__activeWebSocket;
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'input', data: '\r' }));
          }
        });
      }

      // Helper to send input
      const sendInput = (data) => {
        const ws = window.__activeWebSocket;
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'input', data }));
        }
      };

      // Esc key
      const btnEsc = document.getElementById('btn-esc');
      btnEsc?.addEventListener('click', () => sendInput('\x1b'));

      // Arrow keys (real cursor movement)
      const btnArrowUp = document.getElementById('btn-arrow-up');
      const btnArrowDown = document.getElementById('btn-arrow-down');
      btnArrowUp?.addEventListener('click', () => sendInput('\x1b[A'));
      btnArrowDown?.addEventListener('click', () => sendInput('\x1b[B'));
    });
  </script>
</body>
</html>
