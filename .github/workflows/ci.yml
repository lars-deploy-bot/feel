name: CI

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main, dev, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-affected:
    if: github.event_name == 'pull_request'
    name: PR Affected Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run affected checks
        run: bun run check:affected
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check error patterns
        run: cd apps/web && bun run scripts/check-error-patterns.ts

  full-static:
    if: github.event_name == 'push'
    name: Branch Static Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run static checks
        run: bun run static-check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check error patterns
        run: cd apps/web && bun run scripts/check-error-patterns.ts

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/test-results/
            **/coverage/

  auth-rls-contract:
    if: github.event_name == 'pull_request'
    name: Auth/RLS Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate contract test secrets
        env:
          SUPABASE_URL: ${{ secrets.CI_CONTRACT_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.CI_CONTRACT_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_CONTRACT_SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ${{ secrets.CI_CONTRACT_JWT_SECRET }}
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY JWT_SECRET; do
            if [[ -z "${!key}" ]]; then
              echo "::error::Missing required secret for auth/RLS contract gate: $key"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Run auth/RLS contract smoke
        env:
          SUPABASE_URL: ${{ secrets.CI_CONTRACT_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.CI_CONTRACT_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_CONTRACT_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.CI_CONTRACT_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.CI_CONTRACT_SUPABASE_ANON_KEY }}
          JWT_SECRET: ${{ secrets.CI_CONTRACT_JWT_SECRET }}
          STREAM_ENV: local
          SKIP_ENV_VALIDATION: "1"
        run: bun run test:jwt-rls-smoke

  detect-critical-chat-changes:
    if: github.event_name == 'pull_request'
    name: Detect Critical Chat Changes
    runs-on: ubuntu-latest
    outputs:
      run_e2e: ${{ steps.filter.outputs.run_e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect risky path changes for critical chat E2E
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run_e2e:
              - 'apps/web/app/chat/**'
              - 'apps/web/app/api/claude/**'
              - 'apps/web/app/api/sessions/**'
              - 'apps/web/app/api/auth/**'
              - 'apps/web/features/chat/**'
              - 'apps/web/lib/stream/**'
              - 'apps/web/lib/sessions/**'
              - 'apps/web/e2e-tests/chat-critical.spec.ts'
              - 'apps/web/e2e-tests/lib/stream-builder.ts'
              - 'apps/web/e2e-tests/pages/ChatPage.ts'

      - name: Report critical chat E2E requirement
        run: |
          if [[ "${{ steps.filter.outputs.run_e2e }}" == "true" ]]; then
            echo "Critical chat E2E required for this PR."
          else
            echo "Critical chat E2E not required for this PR."
          fi

  critical-chat-e2e:
    if: github.event_name == 'pull_request' && needs.detect-critical-chat-changes.outputs.run_e2e == 'true'
    name: Critical Chat E2E
    runs-on: ubuntu-latest
    needs: [detect-critical-chat-changes]
    steps:
      - name: Check E2E infrastructure
        id: infra
        env:
          SSH_KEY: ${{ secrets.CI_E2E_SSH_KEY }}
          SSH_HOST: ${{ secrets.CI_E2E_SSH_HOST }}
        run: |
          if [[ -z "$SSH_KEY" || -z "$SSH_HOST" ]]; then
            echo "::warning::CI_E2E_SSH_KEY or CI_E2E_SSH_HOST not configured — skipping critical chat E2E (runs on staging deploy instead)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.infra.outputs.skip != 'true'

      - name: Setup Bun
        if: steps.infra.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        if: steps.infra.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        if: steps.infra.outputs.skip != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Setup SSH tunnel to self-hosted Supabase
        if: steps.infra.outputs.skip != 'true'
        env:
          SSH_KEY: ${{ secrets.CI_E2E_SSH_KEY }}
          SSH_HOST: ${{ secrets.CI_E2E_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ci_e2e_key
          chmod 600 ~/.ssh/ci_e2e_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # SSH tunnel: localhost:18000 → Server 2 Supabase API (port 8000)
          # Connects as restricted ci-e2e user (gate script + permitopen="127.0.0.1:8000")
          ssh -o BatchMode=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
            -i ~/.ssh/ci_e2e_key -N \
            -L 127.0.0.1:18000:127.0.0.1:8000 \
            "ci-e2e@${SSH_HOST}" &
          echo "SSH_TUNNEL_PID=$!" >> "$GITHUB_ENV"

          # Wait for tunnel
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/18000) 2>/dev/null; then
              echo "SSH tunnel ready on localhost:18000"
              break
            fi
            sleep 0.5
          done

      - name: Reset E2E database schemas
        if: steps.infra.outputs.skip != 'true'
        env:
          SSH_HOST: ${{ secrets.CI_E2E_SSH_HOST }}
        run: |
          MIGRATIONS_DIR="packages/database/migrations"
          SSH_CMD="ssh -o BatchMode=yes -i ~/.ssh/ci_e2e_key ci-e2e@${SSH_HOST}"
          DB_CMD="docker exec -i supabase-db psql -U postgres -d postgres -v ON_ERROR_STOP=1"

          echo "[CI E2E] Resetting schemas on remote Supabase"
          echo "DROP SCHEMA IF EXISTS app CASCADE; DROP SCHEMA IF EXISTS iam CASCADE; DROP SCHEMA IF EXISTS integrations CASCADE; DROP SCHEMA IF EXISTS lockbox CASCADE; NOTIFY pgrst, 'reload schema';" \
            | $SSH_CMD "$DB_CMD" > /dev/null

          for migration in $(find "$MIGRATIONS_DIR" -maxdepth 1 -name '*.sql' | sort -V); do
            echo "[CI E2E] Applying $(basename "$migration")"
            $SSH_CMD "$DB_CMD" < "$migration" > /dev/null
          done

          echo "NOTIFY pgrst, 'reload schema';" | $SSH_CMD "$DB_CMD" > /dev/null
          echo "[CI E2E] Schema reset complete"

      - name: Create local E2E env file
        if: steps.infra.outputs.skip != 'true'
        working-directory: apps/web
        env:
          SUPABASE_ANON_KEY: ${{ secrets.CI_E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_E2E_SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ${{ secrets.CI_E2E_JWT_SECRET }}
        run: |
          cat > .env.e2e.local <<EOF
          TEST_ENV=local
          NEXT_PUBLIC_APP_URL=http://127.0.0.1:9547
          NEXT_PUBLIC_PREVIEW_BASE=alive.local
          SUPABASE_URL=http://127.0.0.1:18000
          NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:18000
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          JWT_SECRET=${JWT_SECRET}
          EOF
          sed -i 's/^[[:space:]]*//' .env.e2e.local

      - name: Run critical chat E2E
        if: steps.infra.outputs.skip != 'true'
        working-directory: apps/web
        env:
          STREAM_ENV: local
          SKIP_ENV_VALIDATION: "1"
        run: |
          # Run directly with env file (tunnel is already set up, schemas already reset)
          set -a; source .env.e2e.local; set +a
          export STREAM_ENV=local PLAYWRIGHT_TEST=true TEST_MODE=true
          export SKIP_SSL_VALIDATION=true SERVER_CONFIG_PATH=
          export HOME=/tmp/alive-e2e-home
          mkdir -p "$HOME"
          E2E_STRICT_API_GUARD=1 bunx playwright test chat-critical.spec.ts

      - name: Cleanup SSH tunnel
        if: always() && steps.infra.outputs.skip != 'true'
        run: |
          if [[ -n "${SSH_TUNNEL_PID:-}" ]]; then
            kill "$SSH_TUNNEL_PID" 2>/dev/null || true
          fi
          rm -f ~/.ssh/ci_e2e_key

  required-checks:
    name: Required Checks ✅
    runs-on: ubuntu-latest
    needs: [pr-affected, full-static, auth-rls-contract, detect-critical-chat-changes, critical-chat-e2e]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ needs.pr-affected.result }}" != "success" ]]; then
              echo "::error::PR affected checks failed."
              exit 1
            fi
            if [[ "${{ needs.auth-rls-contract.result }}" != "success" ]]; then
              echo "::error::Auth/RLS contract checks failed."
              exit 1
            fi
            if [[ "${{ needs.detect-critical-chat-changes.result }}" != "success" ]]; then
              echo "::error::Critical chat path detection failed."
              exit 1
            fi
            if [[ "${{ needs.detect-critical-chat-changes.outputs.run_e2e }}" == "true" ]]; then
              if [[ "${{ needs.critical-chat-e2e.result }}" != "success" ]]; then
                echo "::error::Critical chat E2E checks failed."
                exit 1
              fi
            fi
          else
            if [[ "${{ needs.full-static.result }}" != "success" ]]; then
              echo "::error::Branch static checks failed."
              exit 1
            fi
          fi
          echo "✅ All required checks passed!"
