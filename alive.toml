schema = 1

[project]
slug = "alive"
display_name = "Alive"
kind = "turbo"
root = "."
workspace = "apps/web"
repo_owner = "lars-deploy-bot"
repo_name = "feel"
default_branch = "main"

[source]
adapter = "local_fs"
path = "."

[build]
setup_command = "bun install --frozen-lockfile"
# Build, then symlink static assets + public into standalone output.
# Next.js standalone doesn't include static files — server.js expects
# them at {__dirname}/.next/static and {__dirname}/public.
# Build, then fix standalone output for systemd runtime:
# 1. Symlink static assets + public (Next.js standalone excludes them)
# 2. Remove @webalive stubs from standalone node_modules (they're empty
#    shells that shadow the real packages). NODE_PATH in the systemd unit
#    points to the repo's node_modules where the real built packages live.
command = """
bun run build:libs && bun run --filter @webalive/web build && \
ln -sfn $(pwd)/apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static && \
ln -sfn $(pwd)/apps/web/public apps/web/.next/standalone/apps/web/public && \
rm -rf apps/web/.next/standalone/node_modules/@webalive
"""
outputs = [
  "apps/web/.next/standalone",
  "apps/web/.next/static",
  "apps/web/public",
]

[systemd]
unit_template = "alive-{environment}.service"
# No release directory — the repo IS the runtime.
# Turbo builds in-place: packages/*/dist/ and apps/web/.next/standalone/.
# The systemd unit runs server.js from the repo root so workers can
# resolve @webalive/* workspace packages via the repo's node_modules.
release_dir_template = ".builds/{environment}"
release_root = "."

[runtime]
kind = "systemd"
env_file = "apps/web/.env.production"
container_port = 3000
healthcheck_path = "/api/health"

[[build_secrets]]
id = "build_env"
path = "apps/web/.env.production"

[[build_secrets]]
id = "server_config"
env = "SERVER_CONFIG_PATH"

[services.browser-control]
enabled = true
port = 5061

[policies.staging]
allow_email = false
blocked_env_keys = [
  "BREVO_SECRET_KEY",
  "LOOPS_API_KEY",
  "RESEND_API_KEY",
  "SENDGRID_API_KEY",
  "POSTMARK_SERVER_TOKEN",
  "SMTP_HOST",
  "SMTP_PORT",
  "SMTP_USER",
  "SMTP_PASS",
  "SMTP_NOREPLY_PASSWORD",
  "MAILGUN_API_KEY",
  "MAILJET_API_KEY",
]
forced_env = { NODE_ENV = "production", HOSTNAME = "0.0.0.0", PATH = "/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/root/.local/bin" }

[policies.production]
allow_email = true
blocked_env_keys = []
forced_env = { NODE_ENV = "production", HOSTNAME = "0.0.0.0", PATH = "/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/root/.local/bin" }
